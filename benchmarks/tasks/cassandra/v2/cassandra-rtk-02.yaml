schema_version: 2
deterministic_first: true
version: v2
task_id: cassandra-rtk-02-v2
title: Compress Gossiper.java to its dependency surface with rtk read
family: rtk
repo: cassandra
pinned_commit: "0269fd5665751e8a6d8eab852e0f66c142b10ee6"
benchmark_mode: deterministic-first
objective: >
  Use rtk read with aggressive filtering to compress Gossiper.java from
  2746 lines to its dependency surface and static interface, stripping
  the license header and all method bodies.
task_description: >
  The Cassandra gossip implementation has been placed in your workspace at
  Gossiper.java. The file is 2746 lines of Java source.

  Your task is to:

  (1) Use rtk read with aggressive filtering (-l aggressive) on Gossiper.java.

  (2) Confirm that import declarations and key static identifiers appear in
      the compressed output.

  (3) Return the compressed output. Do not edit any files.
success_criteria:
  - rtk read -l aggressive is used on Gossiper.java
  - import statements and key static identifiers appear in output
  - Apache license header is absent from the output
  - no files are modified
validation_commands:
  - "python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-02-v2"
fixture_files: []
input_artifacts:
  - name: gossiper_source
    source: benchmarks/tasks/cassandra/fixtures/Gossiper.java
    target_name: Gossiper.java
    primary: true
tool_invocation:
  tool_id: rtk
  args:
    - read
    - Gossiper.java
    - -l
    - aggressive
  output_artifact: reduced_output.txt
  baseline_strategy: identity
  timeout_seconds: 30
deterministic_checks:
  - name: dependency_surface_with_header_stripped
    command: python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-02-v2
quality_evaluation:
  question: >
    Identify the Cassandra and third-party packages imported by Gossiper.java
    and the static identifiers visible in the compressed rtk output. Confirm
    the Apache license header is absent.
  raw_validation_commands:
    - python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-02-v2
  reduced_validation_commands:
    - python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-02-v2
  small_model_allowed: true
  expensive_model_allowed: false
  escalation_note: >
    Escalate only if import declarations are missing or if the license
    header appears verbatim in the output.
output_contract:
  required_fields:
    - compressed_output
steps:
  - step_id: compress
    name: compress
    objective: >
      Use rtk read -l aggressive on Gossiper.java to compress it to its
      dependency surface.
    required_tool: rtk
    allowed_tools: [rtk]
    blocked_tools: [ripgrep, qmd, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [compressed_output]
    artifact_requirements: [step_trace]
  - step_id: report
    name: report
    objective: >
      Produce the final structured answer with the compressed output.
    required_tool: null
    allowed_tools: []
    blocked_tools: [ripgrep, qmd, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [compressed_output]
    artifact_requirements: [final_answer]
baseline_policy:
  remove_tool_under_test: true
tool_variant_policy:
  enforce_tool_under_test: true
