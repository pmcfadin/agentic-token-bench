tool_invocation:
  tool_id: rtk
  args:
    - ls
    - cassandra-db/
  output_artifact: reduced_output.txt
  baseline_strategy: identity
  timeout_seconds: 30
deterministic_checks:
  - name: compact_listing_with_signal_retention
    command: python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-01-v2
quality_evaluation:
  question: >
    List all Java class names in cassandra-db/ and confirm that verbose
    ls -la noise (permissions, owner, timestamps) is absent from the
    rtk ls output.
  raw_validation_commands:
    - python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-01-v2
  reduced_validation_commands:
    - python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-01-v2
  small_model_allowed: true
  expensive_model_allowed: false
  escalation_note: >
    Escalate only if class names are missing from the listing or if
    permission strings appear in the output.
output_contract:
  required_fields:
    - compressed_listing
steps:
  - step_id: list
    name: list
    objective: >
      Use rtk ls on cassandra-db/ to produce a compact listing.
    required_tool: rtk
    allowed_tools: [rtk]
    blocked_tools: [ripgrep, qmd, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [compressed_listing]
    artifact_requirements: [step_trace]
  - step_id: report
    name: report
    objective: >
      Produce the final structured answer with the compressed listing.
    required_tool: null
    allowed_tools: []
    blocked_tools: [ripgrep, qmd, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [compressed_listing]
    artifact_requirements: [final_answer]
baseline_policy:
  remove_tool_under_test: true
tool_variant_policy:
  enforce_tool_under_test: true
