schema_version: 2
deterministic_first: true
version: v2
task_id: cassandra-rtk-01-v2
title: List the Cassandra db package with rtk ls
family: rtk
repo: cassandra
pinned_commit: "0269fd5665751e8a6d8eab852e0f66c142b10ee6"
benchmark_mode: deterministic-first
objective: >
  Use rtk ls to produce a compact directory listing of the Cassandra db
  package (45 source files). The output must retain all class names and
  strip the permission, ownership, and timestamp noise from plain ls -la.
task_description: >
  A flat slice of the Cassandra db package has been placed in your workspace
  at cassandra-db/. It contains 45 Java source files.

  Your task is to:

  (1) Use rtk ls on cassandra-db/ to produce a compact listing.

  (2) Confirm that the key class names appear in the output.

  (3) Return the compressed listing. Do not edit any files.
success_criteria:
  - rtk ls is used on cassandra-db/
  - key class names appear in the compressed listing
  - permission strings, timestamps, and ownership fields are absent
  - no files are modified
validation_commands:
  - "python scripts/validate_cassandra_v2_rtk.py --task cassandra-rtk-01-v2"
