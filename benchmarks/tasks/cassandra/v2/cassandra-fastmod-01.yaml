schema_version: 2
deterministic_first: true
version: v2
task_id: cassandra-fastmod-01-v2
title: Rename read_repair_chance to read_repair_probability across read-repair files
family: fastmod
repo: cassandra
pinned_commit: "0269fd5665751e8a6d8eab852e0f66c142b10ee6"
benchmark_mode: deterministic-first
objective: >
  Use fastmod to rename all occurrences of read_repair_chance to
  read_repair_probability across the Java source, configuration, and test files
  for the Cassandra read repair subsystem.
task_description: >
  The Cassandra configuration key read_repair_chance and its associated references
  in source code are being renamed to read_repair_probability to better reflect
  their semantics.

  Use fastmod with --accept-all --fixed-strings to rename all occurrences of
  read_repair_chance to read_repair_probability across all Java and YAML files.
  The tool modifies files in place; the harness captures the unified diff of all
  workspace changes.
success_criteria:
  - all occurrences of read_repair_probability appear in the diff as added lines
  - all occurrences of read_repair_chance appear in the diff as removed lines
  - no remaining read_repair_chance appears as an added line
validation_commands:
  - "python scripts/validate_cassandra_v2_fastmod.py --task cassandra-fastmod-01-v2"
input_artifacts:
  - name: read_repair_combined
    source: benchmarks/tasks/cassandra/fixtures/cassandra-read-repair-combined.txt
    target_name: combined-context.txt
    primary: true
  - name: read_repair_java
    source: benchmarks/tasks/cassandra/fixtures/cassandra-read-repair/ReadRepair.java
    target_name: ReadRepair.java
  - name: cassandra_yaml
    source: benchmarks/tasks/cassandra/fixtures/cassandra-read-repair/cassandra.yaml
    target_name: cassandra.yaml
  - name: read_repair_test_java
    source: benchmarks/tasks/cassandra/fixtures/cassandra-read-repair/ReadRepairTest.java
    target_name: ReadRepairTest.java
tool_invocation:
  tool_id: fastmod
  args:
    - --accept-all
    - --fixed-strings
    - "read_repair_chance"
    - "read_repair_probability"
    - -e
    - "java,yaml"
    - .
  output_artifact: reduced_output.txt
  output_mode: diff
  baseline_strategy: identity
  timeout_seconds: 30
deterministic_checks:
  - name: diff_contains_renamed_occurrences
    command: python scripts/validate_cassandra_v2_fastmod.py --task cassandra-fastmod-01-v2
quality_evaluation:
  question: >
    Review the unified diff output. Confirm that all occurrences of
    read_repair_chance have been renamed to read_repair_probability across all
    modified files. List the files and line counts changed.
  raw_validation_commands:
    - python scripts/validate_cassandra_v2_fastmod.py --task cassandra-fastmod-01-v2
  reduced_validation_commands:
    - python scripts/validate_cassandra_v2_fastmod.py --task cassandra-fastmod-01-v2
  small_model_allowed: true
  expensive_model_allowed: false
steps:
  - step_id: transform
    name: transform
    objective: >
      Use fastmod to rename read_repair_chance to read_repair_probability
      across all Java and YAML files in the workspace.
    required_tool: fastmod
    allowed_tools: [fastmod]
    blocked_tools: [ripgrep, rtk, qmd, comby, ast-grep]
    completion_contract:
      kind: diff_output
      fields: [unified_diff]
    artifact_requirements: [reduced_output.txt]
baseline_policy:
  remove_tool_under_test: true
tool_variant_policy:
  enforce_tool_under_test: true
