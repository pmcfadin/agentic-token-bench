schema_version: 2
deterministic_first: true
version: v2
task_id: cassandra-ast-grep-02-v2
title: AST-aware rename of SizeTieredCompactionStrategy.validateOptions() calls in tests
family: ast-grep
repo: cassandra
pinned_commit: "0269fd5665751e8a6d8eab852e0f66c142b10ee6"
benchmark_mode: deterministic-first
objective: >
  Use ast-grep to perform an AST-aware rename of all calls to
  SizeTieredCompactionStrategy.validateOptions($OPTS) to
  SizeTieredCompactionStrategy.checkOptions($OPTS) in the STCS test file.
task_description: >
  The SizeTieredCompactionStrategy.validateOptions() static method is being
  renamed to checkOptions() as part of a compaction API cleanup.

  Use ast-grep with --lang java to perform an AST-aware transformation that
  renames all call sites of SizeTieredCompactionStrategy.validateOptions($OPTS)
  to SizeTieredCompactionStrategy.checkOptions($OPTS) in the test file.
  The tool modifies files in place; the harness captures the unified diff.
success_criteria:
  - all SizeTieredCompactionStrategy.validateOptions() calls are renamed to checkOptions()
  - the unified diff contains checkOptions as added lines
  - no SizeTieredCompactionStrategy.validateOptions calls appear as added lines
validation_commands:
  - "python scripts/validate_cassandra_v2_ast_grep.py --task cassandra-ast-grep-02-v2"
input_artifacts:
  - name: stcs_combined
    source: benchmarks/tasks/cassandra/fixtures/cassandra-stcs-combined.txt
    target_name: combined-context.txt
    primary: true
  - name: stcs_test_java
    source: benchmarks/tasks/cassandra/fixtures/cassandra-stcs/SizeTieredCompactionStrategyTest.java
    target_name: SizeTieredCompactionStrategyTest.java
tool_invocation:
  tool_id: ast-grep
  args:
    - run
    - --pattern
    - "SizeTieredCompactionStrategy.validateOptions($OPTS)"
    - --rewrite
    - "SizeTieredCompactionStrategy.checkOptions($OPTS)"
    - --lang
    - java
    - -U
    - .
  output_artifact: reduced_output.txt
  output_mode: diff
  baseline_strategy: identity
  timeout_seconds: 30
deterministic_checks:
  - name: diff_contains_check_options
    command: python scripts/validate_cassandra_v2_ast_grep.py --task cassandra-ast-grep-02-v2
quality_evaluation:
  question: >
    Review the unified diff output. Confirm that all call sites of
    SizeTieredCompactionStrategy.validateOptions() have been renamed to
    SizeTieredCompactionStrategy.checkOptions(). List the exact lines changed.
  raw_validation_commands:
    - python scripts/validate_cassandra_v2_ast_grep.py --task cassandra-ast-grep-02-v2
  reduced_validation_commands:
    - python scripts/validate_cassandra_v2_ast_grep.py --task cassandra-ast-grep-02-v2
  small_model_allowed: true
  expensive_model_allowed: false
steps:
  - step_id: transform
    name: transform
    objective: >
      Use ast-grep to rename SizeTieredCompactionStrategy.validateOptions($OPTS)
      to SizeTieredCompactionStrategy.checkOptions($OPTS) in Java test files.
    required_tool: ast-grep
    allowed_tools: [ast-grep]
    blocked_tools: [ripgrep, rtk, qmd, fastmod, comby]
    completion_contract:
      kind: diff_output
      fields: [unified_diff]
    artifact_requirements: [reduced_output.txt]
baseline_policy:
  remove_tool_under_test: true
tool_variant_policy:
  enforce_tool_under_test: true
