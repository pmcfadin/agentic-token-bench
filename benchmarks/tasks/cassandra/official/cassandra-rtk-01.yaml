task_id: cassandra-rtk-01
title: Identify the actionable failure from noisy Cassandra build output
family: rtk
repo: cassandra
pinned_commit: "0269fd5665751e8a6d8eab852e0f66c142b10ee6"
objective: >
  Run the Cassandra build and use rtk to compress the output, then identify
  the single actionable failure that must be addressed before the build can
  succeed.
task_description: >
  Apache Cassandra is built with Apache Ant. A `ant build` invocation produces
  verbose output that mixes informational messages with the true failure reason.
  Your task is to:

  (1) Run the build command `ant build` in the Cassandra repository root.

  (2) Use rtk to compress the raw build output so that only the actionable
  failure is surfaced.

  (3) Identify the specific error or failure message that must be resolved.

  Do not attempt to fix the build. Produce a structured answer with the
  compressed output, the single actionable failure message, and the component
  or file that triggered the failure.
success_criteria:
  - rtk was used to compress the build output
  - Actionable failure message is present in the answer
  - Component or file name associated with the failure is identified
  - No source files were modified
validation_commands:
  - "python scripts/validate_cassandra_rtk_01.py --task cassandra-rtk-01"
human_review_triggers:
  - "compressed output does not contain the failure line"
  - "multiple conflicting failure messages reported"
steps:
  - step_id: discover
    name: discover
    objective: >
      Run `ant build` in the repository root to produce build output. Capture
      the full raw output for the next step.
    required_tool: null
    allowed_tools: []
    blocked_tools: [ripgrep, qmd, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [raw_output_path]
    artifact_requirements: [step_trace]
  - step_id: analyze
    name: analyze
    objective: >
      Use rtk to compress the raw build output. Identify the single actionable
      failure message from the compressed result.
    required_tool: rtk
    allowed_tools: [rtk]
    blocked_tools: [ripgrep, qmd, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [compressed_output, failure_message, failure_component]
    artifact_requirements: [step_trace]
  - step_id: summarize
    name: summarize
    objective: >
      Produce the final structured answer with the actionable failure message
      and the component or file that triggered it.
    required_tool: null
    allowed_tools: []
    blocked_tools: [ripgrep, qmd, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [failure_message, failure_component, compressed_output]
    artifact_requirements: [final_answer]
baseline_policy:
  remove_tool_under_test: true
tool_variant_policy:
  enforce_tool_under_test: true
