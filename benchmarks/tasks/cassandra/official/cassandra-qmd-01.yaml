task_id: cassandra-qmd-01
title: Answer how the gossip protocol works from source documentation
family: qmd
repo: cassandra
pinned_commit: "0269fd5665751e8a6d8eab852e0f66c142b10ee6"
objective: >
  Answer a precise question about the Cassandra gossip protocol by retrieving
  only the minimal source passage that contains the answer. Do not read
  unrelated files.
task_description: >
  Apache Cassandra uses a gossip protocol to propagate node state across the
  cluster. Your task is to answer the following question using only the relevant
  source or documentation passage in the pinned repository:

  Question: How does Cassandra determine which nodes to gossip with during each
  gossip round, and what is the maximum number of nodes contacted per round?

  Use qmd to retrieve the narrowest passage from the source code or inline
  documentation that directly answers the question. Do not open unrelated files
  or read entire source files. Produce a structured answer with the answer text,
  the source file path where you found it, and the line range of the relevant
  passage.
success_criteria:
  - Answer correctly describes the gossip peer selection process
  - Source file path is a real file in the repository under the pinned commit
  - Line range is plausible for the stated source file
  - No files were modified
  - qmd was used to retrieve the passage
validation_commands:
  - "python scripts/validate_cassandra_qmd_01.py --task cassandra-qmd-01"
human_review_triggers:
  - "source file path does not contain gossip-related code"
  - "answer cannot be traced to the stated source passage"
steps:
  - step_id: retrieve
    name: retrieve
    objective: >
      Use qmd to retrieve the minimal source passage from the Cassandra gossip
      implementation that answers the question about peer selection per gossip
      round. Prefer source files over generated docs.
    required_tool: qmd
    allowed_tools: [qmd]
    blocked_tools: [ripgrep, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [passage_text, source_path, line_range]
    artifact_requirements: [step_trace]
  - step_id: summarize
    name: summarize
    objective: >
      Produce the final structured answer with the answer to the gossip
      peer-selection question, the source file path, and the line range.
    required_tool: null
    allowed_tools: []
    blocked_tools: [ripgrep, qmd, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [answer, source_path, line_range]
    artifact_requirements: [final_answer]
baseline_policy:
  remove_tool_under_test: true
tool_variant_policy:
  enforce_tool_under_test: true
