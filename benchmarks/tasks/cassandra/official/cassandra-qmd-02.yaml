task_id: cassandra-qmd-02
title: Retrieve minimal compaction configuration context for a targeted change
family: qmd
repo: cassandra
pinned_commit: "0269fd5665751e8a6d8eab852e0f66c142b10ee6"
objective: >
  Retrieve only the minimal source context needed to understand how
  compaction throughput is configured, in order to support a targeted code
  change. Do not read the entire file.
task_description: >
  The Cassandra configuration file has been placed in your workspace at
  `cassandra.yaml`. This is the primary configuration file for Apache
  Cassandra, containing all tunable parameters including compaction settings.

  A developer wants to change the default value for the compaction throughput
  limit. Before making the change, they need to know:

  (1) The name of the configuration parameter for compaction throughput.

  (2) The current default value for that parameter.

  (3) The units used for the parameter value.

  Use qmd to retrieve only the relevant passage from `cassandra.yaml`. Do not
  read the entire file. Produce a structured answer containing the three
  pieces of information above, the source file path, and the line range of
  the retrieved passage.
success_criteria:
  - Configuration parameter name is correctly identified
  - Default value is stated and plausible for a throughput-limit parameter
  - Units are specified
  - No files were modified
  - qmd was used to retrieve the passage
validation_commands:
  - "python scripts/validate_cassandra_qmd_02.py --task cassandra-qmd-02"
human_review_triggers:
  - "parameter name does not relate to compaction throughput"
  - "default value cannot be found at the stated line range"
fixture_files:
  - benchmarks/tasks/cassandra/fixtures/cassandra.yaml
steps:
  - step_id: retrieve
    name: retrieve
    objective: >
      Use qmd to retrieve the minimal passage from `cassandra.yaml` in your
      workspace that declares the compaction throughput configuration parameter,
      its default value, and its units.
    required_tool: qmd
    allowed_tools: [qmd]
    blocked_tools: [ripgrep, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [passage_text, source_path, line_range]
    artifact_requirements: [step_trace]
  - step_id: summarize
    name: summarize
    objective: >
      Produce the final structured answer with the parameter name, the default
      value, the units, the source file path, and the line range of the
      retrieved passage.
    required_tool: null
    allowed_tools: []
    blocked_tools: [ripgrep, qmd, rtk, fastmod, ast-grep, comby]
    completion_contract:
      kind: structured_answer
      fields: [parameter_name, default_value, units, source_path, line_range]
    artifact_requirements: [final_answer]
baseline_policy:
  remove_tool_under_test: true
tool_variant_policy:
  enforce_tool_under_test: true
