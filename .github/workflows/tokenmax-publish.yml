name: tokenmax-publish

on:
  push:
    tags:
      - 'tokenmax-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Run tokenmax tests
        run: node --test test/tokenmax/*.test.js

      - name: Publish to npm via trusted publishing
        run: npx -y npm@latest publish --access public
